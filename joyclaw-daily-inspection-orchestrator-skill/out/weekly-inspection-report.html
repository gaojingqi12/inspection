<!doctype html>
<html lang="zh-CN">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>本周巡检趋势</title>
  <style>
    :root {
      color-scheme: light;
      --bg: #f7f7f7;
      --panel: #ffffff;
      --ink: #202020;
      --muted: #686868;
      --line: #e4e4e4;
      --soft: #f1f1f1;
      --shadow: 0 18px 42px rgba(20, 20, 20, 0.08);
    }

    * {
      box-sizing: border-box;
    }

    body {
      margin: 0;
      background: var(--bg);
      color: var(--ink);
      font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
      letter-spacing: 0;
    }

    main {
      max-width: 1180px;
      margin: 0 auto;
      padding: 40px 24px 56px;
    }

    header {
      display: grid;
      gap: 14px;
      margin-bottom: 26px;
    }

    .eyebrow {
      display: inline-flex;
      width: fit-content;
      border: 1px solid var(--line);
      border-radius: 8px;
      padding: 6px 10px;
      background: var(--panel);
      color: var(--muted);
      font-size: 13px;
      line-height: 1.4;
    }

    h1 {
      margin: 0;
      font-size: 32px;
      line-height: 1.15;
      font-weight: 720;
    }

    .meta {
      display: flex;
      flex-wrap: wrap;
      gap: 10px;
      color: var(--muted);
      font-size: 14px;
    }

    .meta span {
      border: 1px solid var(--line);
      border-radius: 8px;
      padding: 7px 10px;
      background: rgba(255, 255, 255, 0.7);
    }

    .grid {
      display: grid;
      grid-template-columns: repeat(2, minmax(0, 1fr));
      gap: 18px;
    }

    .panel {
      min-width: 0;
      border: 1px solid var(--line);
      border-radius: 8px;
      background: var(--panel);
      box-shadow: var(--shadow);
      overflow: hidden;
    }

    .panel-head {
      display: grid;
      grid-template-columns: 1fr auto;
      gap: 16px;
      align-items: start;
      padding: 20px 20px 8px;
    }

    h2 {
      margin: 0;
      font-size: 18px;
      line-height: 1.35;
      font-weight: 680;
    }

    .tag {
      border-radius: 8px;
      padding: 5px 9px;
      background: var(--soft);
      color: var(--muted);
      font-size: 12px;
      white-space: nowrap;
    }

    .stat-row {
      display: grid;
      grid-template-columns: repeat(3, minmax(0, 1fr));
      gap: 10px;
      padding: 8px 20px 14px;
    }

    .stat {
      min-width: 0;
      border-top: 1px solid var(--line);
      padding-top: 11px;
    }

    .stat-label {
      color: var(--muted);
      font-size: 12px;
      line-height: 1.4;
      margin-bottom: 4px;
    }

    .stat-value {
      font-size: 22px;
      line-height: 1.2;
      font-weight: 720;
      white-space: nowrap;
      overflow: hidden;
      text-overflow: ellipsis;
    }

    .legend {
      display: flex;
      flex-wrap: wrap;
      gap: 8px;
      padding: 0 20px 14px;
    }

    .legend button {
      display: inline-flex;
      align-items: center;
      gap: 7px;
      border: 1px solid var(--line);
      border-radius: 8px;
      padding: 7px 9px;
      background: #ffffff;
      color: #404040;
      font: inherit;
      font-size: 12px;
      line-height: 1.3;
      cursor: pointer;
    }

    .legend button.is-active {
      border-color: #b8b8b8;
      background: #f5f5f5;
      color: var(--ink);
    }

    .swatch {
      width: 10px;
      height: 10px;
      border-radius: 999px;
      flex: 0 0 auto;
    }

    .chart {
      min-height: 248px;
      padding: 0 16px 8px;
    }

    .chart-note {
      padding: 0 20px 16px;
      color: var(--muted);
      font-size: 12px;
      line-height: 1.5;
    }

    .screenshot {
      margin: 0 16px 18px;
      border: 1px solid var(--line);
      border-radius: 8px;
      background: #fafafa;
      overflow: hidden;
    }

    .screenshot-head {
      display: flex;
      justify-content: space-between;
      gap: 12px;
      padding: 10px 12px;
      border-bottom: 1px solid var(--line);
      color: var(--muted);
      font-size: 12px;
      line-height: 1.4;
    }

    .screenshot img {
      display: block;
      width: 100%;
      max-height: 320px;
      object-fit: contain;
      background: #ffffff;
    }

    .ai-panel,
    .delivery-panel {
      margin-top: 18px;
      border: 1px solid var(--line);
      border-radius: 8px;
      background: var(--panel);
      box-shadow: var(--shadow);
      overflow: hidden;
    }

    .ai-head,
    .delivery-head {
      display: grid;
      grid-template-columns: 1fr auto;
      gap: 16px;
      align-items: start;
      padding: 20px;
      border-bottom: 1px solid var(--line);
    }

    .ai-title,
    .delivery-title {
      display: grid;
      gap: 6px;
    }

    .ai-title p,
    .delivery-title p {
      margin: 0;
      color: var(--muted);
      font-size: 13px;
      line-height: 1.5;
    }

    .delivery-metrics {
      display: grid;
      grid-template-columns: repeat(3, minmax(0, 1fr));
      gap: 10px;
      padding: 16px 20px 20px;
    }

    .delivery-metric {
      min-width: 0;
      border: 1px solid var(--line);
      border-radius: 8px;
      padding: 14px 14px 12px;
      background: #ffffff;
    }

    .delivery-metric-label {
      color: var(--muted);
      font-size: 12px;
      line-height: 1.45;
      margin-bottom: 8px;
    }

    .delivery-metric-value {
      font-size: 26px;
      line-height: 1.1;
      font-weight: 720;
    }

    .ai-count {
      min-width: 92px;
      border: 1px solid var(--line);
      border-radius: 8px;
      padding: 10px 12px;
      text-align: center;
      background: #fafafa;
    }

    .ai-count strong {
      display: block;
      font-size: 28px;
      line-height: 1;
    }

    .ai-count span {
      color: var(--muted);
      font-size: 12px;
    }

    .ai-users {
      display: grid;
      grid-template-columns: repeat(auto-fill, minmax(180px, 1fr));
      gap: 10px;
      padding: 16px 20px 20px;
    }

    .ai-user {
      min-width: 0;
      border: 1px solid var(--line);
      border-radius: 8px;
      padding: 10px 11px;
      background: #ffffff;
    }

    .ai-user-name {
      font-size: 15px;
      font-weight: 680;
      line-height: 1.35;
      margin-bottom: 4px;
    }

    .ai-user-meta {
      color: var(--muted);
      font-size: 12px;
      line-height: 1.45;
      overflow-wrap: anywhere;
    }

    svg {
      display: block;
      width: 100%;
      height: 230px;
    }

    .empty {
      display: grid;
      place-items: center;
      min-height: 230px;
      border-top: 1px solid var(--line);
      color: var(--muted);
      font-size: 14px;
    }

    .axis {
      fill: #777777;
      font-size: 12px;
    }

    .grid-line {
      stroke: #e8e8e8;
      stroke-width: 1;
    }

    .trend-line {
      fill: none;
      stroke-width: 3;
      stroke-linecap: round;
      stroke-linejoin: round;
      cursor: pointer;
      opacity: 0.42;
      transition: opacity 120ms ease, stroke-width 120ms ease;
    }

    .trend-line.is-active {
      opacity: 1;
      stroke-width: 4;
    }

    .trend-point {
      stroke: #ffffff;
      stroke-width: 2;
      cursor: pointer;
      opacity: 0.7;
    }

    .trend-point.is-active {
      opacity: 1;
    }

    footer {
      margin-top: 20px;
      color: var(--muted);
      font-size: 12px;
      line-height: 1.6;
    }

    @media (max-width: 760px) {
      main {
        padding: 26px 14px 36px;
      }

      h1 {
        font-size: 26px;
      }

      .grid {
        grid-template-columns: 1fr;
      }

      .panel-head,
      .stat-row,
      .ai-head,
      .delivery-head,
      .delivery-metrics {
        grid-template-columns: 1fr;
      }

      .tag {
        width: fit-content;
      }
    }
  </style>
</head>

      "continuous_delivery_team_space_online_requirement_rate": "%"

    const metricMap = {
      delay_test_rate: {
        title: "延期提测率",
        default_metric_key: "delay_test_rate_okr",
        metrics: [
          { key: "planned_test_requirements", label: "计划提测需求数", unit: "count", color: "#2f6f9f" },
          { key: "delayed_test_requirements", label: "延期提测需求数", unit: "count", color: "#c94c45" },
          { key: "delay_test_rate_okr", label: "延期提测率", unit: "%", color: "#826d22" }
        ]
      },
      delay_online_rate: {
        title: "延期上线率",
        default_metric_key: "delay_online_rate",
        metrics: [
          { key: "planned_online_requirements", label: "计划上线需求数", unit: "count", color: "#2f6f9f" },
          { key: "delayed_online_requirements", label: "延期上线需求数", unit: "count", color: "#c94c45" },
          { key: "delay_online_rate", label: "延期上线率", unit: "%", color: "#2b7a66" }
        ]
      },
      technical_refactor_working_hours: {
        title: "技术改造工时占比",
        default_metric_key: "technical_refactor_working_hours_rate",
        metrics: [
          { key: "technical_refactor_working_hours_rate", label: "技术改造工时占比", unit: "%", color: "#826d22" }
        ]
      },
      bi_weekly_delivery_rate: {
        title: "双周交付率",
        default_metric_key: "biweekly_delivery_rate",
        metrics: [
          { key: "biweekly_delivery_rate", label: "双周交付率", unit: "%", color: "#2f2f2f" }
        ]
      }
    };

	    const cardStore = new Map();

    function parseDate(value) {
      const date = new Date(`${value}T00:00:00`);
      return Number.isNaN(date.getTime()) ? null : date;
    }

    function fmtDate(value) {
      const date = parseDate(value);
      if (!date) return value || "-";
      return `${String(date.getMonth() + 1).padStart(2, "0")}/${String(date.getDate()).padStart(2, "0")}`;
    }

    function fmtValue(value, unit) {
      if (value === null || value === undefined || value === "") return "-";
      const number = Number(value);
      const shown = Number.isFinite(number) ? Number(number.toFixed(2)).toString() : String(value);
      return unit === "%" ? `${shown}%` : shown;
    }

	    function escapeHtml(value) {
	      return String(value)
	        .replaceAll("&", "&amp;")
        .replaceAll("<", "&lt;")
        .replaceAll(">", "&gt;")
        .replaceAll('"', "&quot;")
	        .replaceAll("'", "&#39;");
	    }

    function pointValue(point) {
      if (!point) return null;
      const number = Number(point.value);
      return Number.isFinite(number) ? number : null;
    }

    function filterThisWeek(points, range) {
      const start = parseDate(range?.start_date);
      const end = parseDate(range?.end_date);
      return (points || [])
        .filter((point) => {
          const date = parseDate(point.date);
          if (!date) return false;
          if (start && date < start) return false;
          if (end && date > end) return false;
          return true;
        })
        .sort((a, b) => String(a.date).localeCompare(String(b.date)));
    }

    function latest(points) {
      for (let index = points.length - 1; index >= 0; index -= 1) {
        const value = pointValue(points[index]);
        if (value !== null) return { point: points[index], value };
      }
      return null;
    }

    function delta(points) {
      const valid = points.map((point) => pointValue(point)).filter((value) => value !== null);
      if (valid.length < 2) return null;
      return valid[valid.length - 1] - valid[0];
    }

    function pointsByDate(points) {
      const map = new Map();
      points.forEach((point) => map.set(String(point.date), point));
      return map;
    }

    function normalizeMetric(metric, range) {
      return {
        ...metric,
        points: filterThisWeek(metric.points || [], range)
      };
    }

    function extractCards(report) {
      const range = report.time_range || {};

      if (Array.isArray(report.focus_series)) {
        return report.focus_series.map((item, index) => {
          const config = metricMap[item.indicator_type] || {};
          const rawMetrics = Array.isArray(item.metrics) && item.metrics.length
            ? item.metrics
            : [{
                key: item.focus_key || config.default_metric_key,
                label: item.focus_label || item.name || config.title || "关注值",
                unit: item.unit || "",
                color: item.color,
                points: item.points || []
              }];

          const metrics = rawMetrics.map((metric, metricIndex) => {
            const fallback = (config.metrics || []).find((candidate) => candidate.key === metric.key) || {};
            return normalizeMetric({
              key: metric.key || fallback.key || `metric_${metricIndex}`,
              label: metric.label || fallback.label || metric.key || "指标",
              unit: metric.unit || fallback.unit || "",
              color: metric.color || fallback.color || ["#2f6f9f", "#c94c45", "#826d22", "#2b7a66"][metricIndex % 4],
              points: metric.points || []
            }, range);
          });

          return {
            id: `card-${index}`,
            indicator_type: item.indicator_type,
            name: item.name || config.title || item.indicator_name || "指标",
	            default_metric_key: item.default_metric_key || item.focus_key || config.default_metric_key || metrics[0]?.key,
	            inspection_date: item.inspection_date || report.inspection_date || report.time_range?.end_date,
	            screenshot: item.screenshot || item.query_screenshot || "",
	            screenshot_label: item.screenshot_label || "当天巡检截图",
	            metrics
	          };
        });
      }

      if (!Array.isArray(report.indicators)) return [];

      return report.indicators.map((indicator, index) => {
        const config = metricMap[indicator.indicator_type] || {};
        const metrics = (config.metrics || []).map((metric) => normalizeMetric({
          ...metric,
          points: indicator.history ? (indicator.history[metric.key] || []) : []
        }, range));

        return {
          id: `card-${index}`,
          indicator_type: indicator.indicator_type,
          name: config.title || indicator.indicator_name || "指标",
	          default_metric_key: indicator.focus_metric_key || config.default_metric_key || metrics[0]?.key,
	          inspection_date: indicator.inspection_date || report.inspection_date || report.time_range?.end_date,
	          screenshot: indicator.source?.query_screenshot || "",
	          screenshot_label: "当天巡检截图",
	          metrics
	        };
      });
    }

    function getSelectedMetric(card) {
      return card.metrics.find((metric) => metric.key === card.selected_metric_key) || card.metrics[0];
    }

    function metricStats(metric, inspectionDate) {
      const latestPoint = latest(metric.points);
      const change = delta(metric.points);
      return {
        latestText: latestPoint ? fmtValue(latestPoint.value, metric.unit) : "-",
        changeText: change === null ? "-" : `${change > 0 ? "+" : ""}${fmtValue(change, metric.unit)}`,
        latestDate: inspectionDate ? fmtDate(inspectionDate) : "-"
      };
    }

    function updateStats(cardId, metricKey) {
      const card = cardStore.get(cardId);
      if (!card) return;

      card.selected_metric_key = metricKey;
      const metric = getSelectedMetric(card);
      const stats = metricStats(metric, card.inspection_date);
      const root = document.querySelector(`[data-card-id="${cardId}"]`);
      if (!root) return;

      root.querySelector("[data-stat='latest']").textContent = stats.latestText;
      root.querySelector("[data-stat='change']").textContent = stats.changeText;
      root.querySelector("[data-stat='date']").textContent = stats.latestDate;
      root.querySelector("[data-active-label]").textContent = metric.label;

      root.querySelectorAll("[data-metric-key]").forEach((node) => {
        node.classList.toggle("is-active", node.dataset.metricKey === metricKey);
      });
    }

    function buildDates(metrics) {
      return Array.from(new Set(metrics.flatMap((metric) => metric.points.map((point) => String(point.date)))))
        .sort((a, b) => a.localeCompare(b));
    }

    function metricYFactory(metric, pad, plotH) {
      const values = metric.points.map(pointValue).filter((value) => value !== null);
      if (!values.length) return () => pad.top + plotH / 2;

      let min = Math.min(...values);
      let max = Math.max(...values);
      if (min === max) {
        min -= 1;
        max += 1;
      }
      const buffer = (max - min) * 0.14;
      min -= buffer;
      max += buffer;

      return (value) => pad.top + plotH - ((value - min) / (max - min)) * plotH;
    }

    function drawChart(card) {
      const dates = buildDates(card.metrics);
      const hasValues = card.metrics.some((metric) => metric.points.some((point) => pointValue(point) !== null));
      if (!dates.length || !hasValues) {
        return '<div class="empty">暂无本周可用数据</div>';
      }

      const width = 520;
      const height = 220;
      const pad = { left: 24, right: 20, top: 22, bottom: 38 };
      const plotW = width - pad.left - pad.right;
      const plotH = height - pad.top - pad.bottom;
      const x = (index) => pad.left + (dates.length === 1 ? plotW / 2 : (plotW * index) / (dates.length - 1));

      const grid = [0, 0.5, 1].map((ratio) => {
        const gy = pad.top + plotH * ratio;
        return `<line class="grid-line" x1="${pad.left}" y1="${gy}" x2="${width - pad.right}" y2="${gy}"></line>`;
      }).join("");

      const xLabels = dates.map((date, index) => `<text class="axis" x="${x(index)}" y="${height - 10}" text-anchor="middle">${fmtDate(date)}</text>`).join("");

      const lines = card.metrics.map((metric) => {
        const byDate = pointsByDate(metric.points);
        const y = metricYFactory(metric, pad, plotH);
        const coords = dates.map((date, index) => {
          const point = byDate.get(date);
          const value = pointValue(point);
          return value === null ? null : { date, point, value, x: x(index), y: y(value) };
        }).filter(Boolean);

        if (!coords.length) return "";

        const path = coords.map((item, index) => `${index === 0 ? "M" : "L"} ${item.x.toFixed(2)} ${item.y.toFixed(2)}`).join(" ");
        const isActive = metric.key === card.selected_metric_key ? " is-active" : "";
        const dots = coords.map((item) => `<circle class="trend-point${isActive}" data-card-id="${card.id}" data-metric-key="${escapeHtml(metric.key)}" cx="${item.x}" cy="${item.y}" r="4" fill="${metric.color}"><title>${escapeHtml(metric.label)} ${fmtDate(item.date)} ${fmtValue(item.value, metric.unit)}</title></circle>`).join("");

        return `<path class="trend-line${isActive}" data-card-id="${card.id}" data-metric-key="${escapeHtml(metric.key)}" d="${path}" stroke="${metric.color}"><title>${escapeHtml(metric.label)}</title></path>${dots}`;
      }).join("");

      return `<svg viewBox="0 0 ${width} ${height}" role="img" aria-label="${escapeHtml(card.name)}本周趋势">
        ${grid}
        ${lines}
        ${xLabels}
      </svg>`;
    }

    function renderLegend(card) {
      return `<div class="legend">
        ${card.metrics.map((metric) => `<button type="button" data-card-id="${card.id}" data-metric-key="${escapeHtml(metric.key)}" class="${metric.key === card.selected_metric_key ? "is-active" : ""}">
          <span class="swatch" style="background:${metric.color}"></span>
          <span>${escapeHtml(metric.label)}</span>
        </button>`).join("")}
      </div>`;
    }

	    function renderScreenshot(card) {
	      if (!card.screenshot) {
	        return '<div class="screenshot"><div class="screenshot-head"><span>当天巡检截图</span><span>未提供</span></div></div>';
	      }

	      const label = escapeHtml(card.screenshot_label || "当天巡检截图");
	      const src = escapeHtml(card.screenshot);
	      const alt = escapeHtml(`${card.name}当天巡检截图`);
	      return `<figure class="screenshot">
	        <figcaption class="screenshot-head">
	          <span>${label}</span>
	        </figcaption>
	        <img src="${src}" alt="${alt}" loading="lazy">
	      </figure>`;
    }

    function renderAIInspection(report) {
      const ai = report.ai_inspection || {};
      const root = document.getElementById("ai-inspection");
      if (!root) return;

      const users = Array.isArray(ai.users)
        ? ai.users
        : (Array.isArray(ai.names) ? ai.names.map((name) => ({ name })) : []);
      const count = ai.count ?? users.length;
      const date = ai.date || report.time_range?.end_date || "-";
      const status = ai.status || "missing";

      const userCards = users.length
        ? users.map((user) => {
            const name = escapeHtml(user.name || user["用户姓名"] || user.erp || user["用户erp"] || "-");
            const erp = escapeHtml(user.erp || user["用户erp"] || "-");
            const rate = fmtValue(user.ai_code_local_submit_rate ?? user["AI代码本地提交占比"], "%");
            return `<div class="ai-user">
              <div class="ai-user-name">${name}</div>
              <div class="ai-user-meta">ERP：${erp}</div>
              <div class="ai-user-meta">AI代码本地提交占比：${rate}</div>
            </div>`;
          }).join("")
        : '<div class="empty">当天没有深度用户为否的人员</div>';

	      root.innerHTML = `<div class="ai-head">
	        <div class="ai-title">
	          <h2>AI 巡检</h2>
	          <p>${escapeHtml(date)} 深度用户为否名单</p>
	          <p>状态：${escapeHtml(status)}</p>
	        </div>
        <div class="ai-count">
          <strong>${escapeHtml(count)}</strong>
          <span>人</span>
        </div>
      </div>
      <div class="ai-users">${userCards}</div>`;
    }

    function renderContinuousDelivery(report) {
      const delivery = report.continuous_delivery || {};
      const root = document.getElementById("continuous-delivery");
      if (!root) return;

	      const metrics = delivery.metrics || {};
	      const units = delivery.unit || {};
	      const source = delivery.source || {};
	      const date = delivery.date || report.time_range?.end_date || "-";
	      const status = delivery.status || "missing";
	      const screenshotSrc = source.query_screenshot || "";
      const metricDefs = [
        {
          key: "team_space_dev_test_online_requirements",
          label: "团队空间开发测试上线需求数"
        },
        {
          key: "team_space_continuous_delivery_dev_test_online_requirements",
          label: "团队空间_持需交付_开发测试上线需求数"
        },
        {
          key: "continuous_delivery_team_space_online_requirement_rate",
          label: "持续交付_团队空间上线需求占比"
        }
      ];

      const metricCards = metricDefs.map((metric) => {
        const unit = units[metric.key] || (metric.key.endsWith("_rate") ? "%" : "count");
        return `<div class="delivery-metric">
          <div class="delivery-metric-label">${escapeHtml(metric.label)}</div>
          <div class="delivery-metric-value">${fmtValue(metrics[metric.key], unit)}</div>
        </div>`;
      }).join("");

	      const screenshot = screenshotSrc
	        ? `<figure class="screenshot">
	            <figcaption class="screenshot-head">
	              <span>持续交付当天截图</span>
	            </figcaption>
	            <img src="${escapeHtml(screenshotSrc)}" alt="持续交付当天截图" loading="lazy">
	          </figure>`
        : "";

      root.innerHTML = `<div class="delivery-head">
	        <div class="delivery-title">
	          <h2>持续交付</h2>
	          <p>${escapeHtml(date)} 三项核心指标</p>
	          <p>状态：${escapeHtml(status)}</p>
	        </div>
        <div class="tag">当天结果</div>
      </div>
      <div class="delivery-metrics">${metricCards}</div>
      ${screenshot}`;
    }

    function renderCard(card) {
      card.selected_metric_key = card.default_metric_key || card.metrics[0]?.key;
      const activeMetric = getSelectedMetric(card);
      const stats = metricStats(activeMetric, card.inspection_date);
      cardStore.set(card.id, card);

      return `<article class="panel" data-card-id="${card.id}">
        <div class="panel-head">
          <h2>${escapeHtml(card.name)}</h2>
          <div class="tag" data-active-label>${escapeHtml(activeMetric.label)}</div>
        </div>
        <div class="stat-row">
          <div class="stat">
            <div class="stat-label">最新值</div>
            <div class="stat-value" data-stat="latest">${stats.latestText}</div>
          </div>
          <div class="stat">
            <div class="stat-label">较周初</div>
            <div class="stat-value" data-stat="change">${stats.changeText}</div>
          </div>
          <div class="stat">
            <div class="stat-label">最新日期</div>
            <div class="stat-value" data-stat="date">${stats.latestDate}</div>
          </div>
        </div>
        ${renderLegend(card)}
        <div class="chart">${drawChart(card)}</div>
        <div class="chart-note">点击折线或图例切换指标；不同单位的线条按各自区间归一化展示。</div>
        ${renderScreenshot(card)}
      </article>`;
    }

    function bindInteractions() {
      document.querySelectorAll("[data-card-id][data-metric-key]").forEach((node) => {
        node.addEventListener("click", () => {
          updateStats(node.dataset.cardId, node.dataset.metricKey);
        });
      });
    }

    function render() {
      const report = window.JOYCLAW_WEEKLY_REPORT || {};
      const range = report.time_range || {};
      const charts = document.getElementById("charts");
      const department = report.department_c3 || "支付方案研发部";
      const start = range.start_date || "-";
      const end = range.end_date || "-";

      document.getElementById("department").textContent = department;
      document.getElementById("date-range").textContent = `${start} 至 ${end}`;
      document.getElementById("generated-at").textContent = report.generated_at ? `生成时间 ${report.generated_at}` : "生成时间 -";

      const cards = extractCards(report);
      cardStore.clear();

      charts.innerHTML = cards.length
        ? cards.map(renderCard).join("")
        : '<article class="panel"><div class="empty">暂无本周巡检 JSON</div></article>';

      bindInteractions();
      renderContinuousDelivery(report);
      renderAIInspection(report);
    }

    render();
  </script>
